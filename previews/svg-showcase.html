<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SVG Showcase</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
    .card{background:#111827;border:1px solid #334155;border-radius:14px;padding:12px}
    img{width:100%;height:auto;display:block;background:#1f2937;border-radius:10px}
    h3{font-size:14px;margin:0 0 8px}
  </style>
</head>
<body>
  <h2>배당/특별/원금 카드 + CTA 아이콘 시안</h2>
  <div class="grid">
    <div class="card"><h3>배당금 카드</h3><img src="../icons/ui/card-dividend.svg"/></div>
    <div class="card"><h3>특별금 카드</h3><img src="../icons/ui/card-special.svg"/></div>
    <div class="card"><h3>원금 카드</h3><img src="../icons/ui/card-base.svg"/></div>
    <div class="card"><h3>CTA 아이콘 A (Outline)</h3><img src="../icons/ui/cta-outline.svg"/></div>
    <div class="card"><h3>CTA 아이콘 B (DuoTone)</h3><img src="../icons/ui/cta-duotone.svg"/></div>
  </div>
</body>
</html>
